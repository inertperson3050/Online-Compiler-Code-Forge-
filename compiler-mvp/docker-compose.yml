version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: codeforge_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - codeforge_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeforge_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/compiler_mvp
      - RAPIDAPI_KEY=${RAPIDAPI_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - codeforge_net

  # ── Frontend (prod build served by nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: codeforge_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codeforge_net

volumes:
  mongo_data:

networks:
  codeforge_net:
    driver: bridge
